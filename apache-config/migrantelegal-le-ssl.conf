# ============================================
# Configuración HTTPS para Migrante Legal (migrantelegal.cl)
# Apache actúa como proxy reverso hacia el contenedor Docker con SSL
# NOTA: Este archivo se debe crear DESPUÉS de obtener el certificado SSL con Certbot
# ============================================

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerAdmin admin@migrantelegal.cl
    ServerName migrantelegal.cl
    ServerAlias www.migrantelegal.cl

    # Logs específicos para este sitio
    ErrorLog ${APACHE_LOG_DIR}/migrantelegal-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/migrantelegal-ssl-access.log combined

    # Proxy hacia el contenedor Docker en puerto 8080 (HTTP interno)
    # El contenedor maneja su propio SSL en 8443, pero usamos 8080 para simplicidad
    ProxyPreserveHost On
    ProxyPass / http://localhost:8080/
    ProxyPassReverse / http://localhost:8080/

    # Configuración de proxy
    <Proxy *>
        Order deny,allow
        Allow from all
    </Proxy>

    # Headers para informar al contenedor sobre HTTPS
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"
    RequestHeader set X-Forwarded-Ssl on

    # Configuración SSL (Certbot agregará estas líneas automáticamente)
    # SSLCertificateFile /etc/letsencrypt/live/migrantelegal.cl/fullchain.pem
    # SSLCertificateKeyFile /etc/letsencrypt/live/migrantelegal.cl/privkey.pem
    # Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>

# Redirección de HTTP a HTTPS
<VirtualHost *:80>
    ServerName migrantelegal.cl
    ServerAlias www.migrantelegal.cl
    
    # Redirigir todo el tráfico a HTTPS
    RewriteEngine on
    RewriteCond %{SERVER_NAME} =migrantelegal.cl [OR]
    RewriteCond %{SERVER_NAME} =www.migrantelegal.cl
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

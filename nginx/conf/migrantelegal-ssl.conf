# ============================================
# Configuración HTTP para Migrante Legal
# Apache en el HOST maneja el SSL en puerto 443
# Nginx solo sirve contenido en HTTP (puerto 8080 en el host, puerto 80 en el contenedor)
# ============================================

# Servidor HTTP para la aplicación
server {
    listen 80;
    listen [::]:80;
    server_name migrantelegal.cl www.migrantelegal.cl;

    # Location para validación de Let's Encrypt (ACME Challenge)
    location /.well-known/acme-challenge/ {
        root /opt/projects/migrante-legal/nginx/webroot;
    }

    # Proxy hacia la aplicación Next.js
    location / {
        proxy_pass http://migrantelegal-app:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts para Next.js
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffer sizes
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # Optimización para archivos estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://migrantelegal-app:3001;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, immutable";
        expires 1y;
    }
}
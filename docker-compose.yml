# ============================================
# Docker Compose para Migrante Legal
# ============================================
services:
  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    container_name: migrantelegal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: migrantelegal
      POSTGRES_PASSWORD: migrantelegal2026
      POSTGRES_DB: migrantelegal_db
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - migrantelegal-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U migrantelegal"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin Web Interface
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: migrantelegal-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@migrantelegal.cl
      PGADMIN_DEFAULT_PASSWORD: admin2026
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5052:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - migrantelegal-network
    depends_on:
      postgres:
        condition: service_healthy

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: migrantelegal-app
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://migrantelegal:migrantelegal2026@postgres:5432/migrantelegal_db"
      NODE_ENV: production  # ✅ Cambiado a development para Fast Refresh
    # Puerto removido - solo accesible internamente por nginx  
    expose:
      - "3001"
    volumes:
      # ✅ Volumes completos para desarrollo con Fast Refresh
      - .:/app
      - /app/node_modules
      - /app/.next
    networks:
      - migrantelegal-network
    depends_on:
      postgres:
        condition: service_healthy

  # Nginx Reverse Proxy con SSL
  nginx:
    image: nginx:stable-alpine
    container_name: migrantelegal-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx/conf:/etc/nginx/conf.d
      - ./nginx/ssl:/etc/nginx/ssl
      - /opt/projects/migrante-legal/nginx/webroot:/opt/projects/migrante-legal/nginx/webroot
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/lib/letsencrypt:/var/lib/letsencrypt
    networks:
      - migrantelegal-network
    depends_on:
      - app

  # Certbot para SSL automático
  certbot:
    image: certbot/certbot:latest
    container_name: migrantelegal-certbot
    volumes:
      - /opt/projects/migrante-legal/nginx/webroot:/opt/projects/migrante-legal/nginx/webroot
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/lib/letsencrypt:/var/lib/letsencrypt
    command: certonly --webroot --webroot-path=/var/www/html --email admin@migrantelegal.cl --agree-tos --no-eff-email --staging -d migrantelegal.cl -d www.migrantelegal.cl

# Volumes persistentes
volumes:
  postgres-data:
    driver: local
  pgadmin-data:
    driver: local
  certbot-etc:
    driver: local
  certbot-var:
    driver: local

# Red interna
networks:
  migrantelegal-network:
    driver: bridge
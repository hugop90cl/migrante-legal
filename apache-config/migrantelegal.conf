# ============================================
# Configuración HTTP para Migrante Legal (migrantelegal.cl)
# Apache actúa como proxy reverso hacia el contenedor Docker
# ============================================

<VirtualHost *:80>
    ServerAdmin admin@migrantelegal.cl
    ServerName migrantelegal.cl
    ServerAlias www.migrantelegal.cl

    # Logs específicos para este sitio
    ErrorLog ${APACHE_LOG_DIR}/migrantelegal-error.log
    CustomLog ${APACHE_LOG_DIR}/migrantelegal-access.log combined

    # Proxy hacia el contenedor Docker en puerto 8080
    ProxyPreserveHost On
    ProxyPass / http://localhost:8080/
    ProxyPassReverse / http://localhost:8080/

    # Configuración de proxy
    <Proxy *>
        Order deny,allow
        Allow from all
    </Proxy>

    # Headers para el proxy
    RequestHeader set X-Forwarded-Proto "http"
    RequestHeader set X-Forwarded-Port "80"
</VirtualHost>
